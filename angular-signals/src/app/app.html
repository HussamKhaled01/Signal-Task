<div class="page">

  <div class="card">
    <h2 class="card-title">Number Calculator</h2>

    <div class="field">
      <label>First Number</label>
      <input type="text" placeholder="Enter first number" #first (input)="firstNumber_str.set(first.value)">
    </div>
    <div class="field">
      <label>Operation</label>
      <select #operation (input)="operation_str.set(operation.value)">
        <option value="add">Add</option>
        <option value="subtract">Subtract</option>
        <option value="multiply">Multiply</option>
        <option value="divide">Divide</option>
      </select>
    </div>

    <div class="field">
      <label>Second Number</label>
      <input type="text" placeholder="Enter second number" #second (input)="secondNumber_str.set(second.value)">
    </div>

    <div class="result">
      Result: <strong>{{ result() }}</strong>
    </div>
  </div>


  <div class="card">
    <h2 class="card-title">Full Name Builder</h2>

    <div class="field">
      <label>First Name</label>
      <input type="text" placeholder="Enter your first name" #firstName (input)="firstName_str.set(firstName.value)">
    </div>

    <div class="field">
      <label>Second Name</label>
      <input type="text" placeholder="Enter your second name" #secondName
        (input)="secondName_str.set(secondName.value)">
    </div>

    <div class="field">
      <label>Last Name</label>
      <input type="text" placeholder="Enter your last name" #lastName (input)="lastName_str.set(lastName.value)">
    </div>

    <div class="result">
      Full Name: <strong>{{ fullName() }}</strong>
    </div>
  </div>

</div>
